name: ride_analyzer
description: A cycling data analysis app that imports from Wanlu, iGPSSport, FIT files, matches Strava segments, and uploads to Xingzhe app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # HTTP & Network
  dio: ^5.4.3+1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Charts & Visualization
  fl_chart: ^0.68.0
  
  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  
  # File Handling
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  path: ^1.9.0
  permission_handler: ^11.3.1
  
  # FIT File Parsing
  fit_parser: ^2.0.0
  
  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  collection: ^1.18.0
  async: ^2.11.0
  http: ^1.2.1
  shared_preferences: ^2.2.3
  
  # URL Launcher
  url_launcher: ^6.2.6
  
  # Package Info
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  # App assets
  assets:
    - assets/images/
    - assets/icons/
